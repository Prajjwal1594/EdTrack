{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block page_title %}Profile{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left"><h1>My Profile</h1></div>
</div>
<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:860px;">
  <div class="card">
    <div class="card-header"><span class="card-title">Personal Information</span></div>
    <form method="POST" action="{{ url_for('auth.profile') }}">
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" value="{{ current_user.email }}" disabled style="background:var(--cream); color:var(--ink-light);">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}" placeholder="+1 (555) 0000">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <input type="text" class="form-control" value="{{ current_user.role | title }}" disabled style="background:var(--cream); color:var(--ink-light);">
        </div>
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
      </div>
    </form>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Change Password</span></div>
    <form method="POST" action="{{ url_for('auth.profile') }}">
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input type="password" name="current_password" class="form-control" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control" placeholder="••••••••" minlength="8">
        </div>
        <div style="background:var(--cream); border-radius:8px; padding:12px 14px; font-size:12px; color:var(--ink-light);">
          <i class="fas fa-shield-halved"></i> Password must be at least 8 characters.
        </div>
        <input type="hidden" name="name" value="{{ current_user.name }}">
      </div>
      <div class="modal-footer">
        <button type="submit" class="btn btn-outline">Update Password</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
