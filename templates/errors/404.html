{% extends 'base.html' %}
{% block content %}
<div class="container py-5 text-center">
  <div class="card p-5" style="max-width:600px; margin:0 auto; border-radius:24px; background:white; position:relative; overflow:hidden;">
    <div style="font-size:80px; font-weight:800; color:rgba(0,0,0,0.05); position:absolute; top:-20px; left:20px;">404</div>
    <div style="position:relative; z-index:1;">
      <i class="fas fa-map-marked-alt fa-3x mb-4" style="color:var(--forest-light);"></i>
      <h2 style="font-family:'Playfair Display', serif; font-weight:700;">Page Not Found</h2>
      <p class="text-muted mb-4">The route <strong>{{ request.path }}</strong> doesn't seem to exist in our system.</p>
      <a href="{{ url_for('auth.index') }}" class="btn btn-primary" style="background:var(--forest); border:none; padding:12px 24px;">Return Home</a>
    </div>
  </div>
</div>
{% endblock %}
