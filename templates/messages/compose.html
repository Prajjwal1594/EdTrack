{% extends "base.html" %}
{% block title %}Compose Message{% endblock %}
{% block page_title %}Compose{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left"><h1>New Message</h1></div>
  <a href="{{ url_for('messages.inbox') }}" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:700px;">
  <div class="card-header"><span class="card-title">Compose Message</span></div>
  <form method="POST" action="{{ url_for('messages.compose') }}">
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">To</label>
        <select name="recipient_id" class="form-control" required>
          <option value="">-- Select recipient --</option>
          {% set current_role = '' %}
          {% for u in recipients %}
          {% if u.role != current_role %}
          {% if current_role %}</optgroup>{% endif %}
          <optgroup label="{{ u.role | title }}s">
          {% set current_role = u.role %}
          {% endif %}
          <option value="{{ u.id }}" {% if u.id == preselect %}selected{% endif %}>{{ u.name }} ({{ u.email }})</option>
          {% endfor %}
          {% if recipients %}</optgroup>{% endif %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Subject</label>
        <input type="text" name="subject" class="form-control" required placeholder="Message subject...">
      </div>
      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea name="body" class="form-control" rows="8" required placeholder="Type your message here..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <a href="{{ url_for('messages.inbox') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send Message</button>
    </div>
  </form>
</div>
{% endblock %}
