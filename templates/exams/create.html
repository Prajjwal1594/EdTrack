{% extends "base.html" %}
{% block title %}Create Exam{% endblock %}
{% block page_title %}Create Exam{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <div class="breadcrumb"><a href="{{ url_for('exams.index') }}">Exams</a> / Create</div>
    <h1>Create New Exam</h1>
  </div>
  <a href="{{ url_for('exams.index') }}" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="card" style="max-width:700px;">
  <form method="POST" action="{{ url_for('exams.create_exam') }}">
    <div class="card-body">
      <div class="form-group"><label class="form-label">Exam Title *</label>
        <input type="text" name="title" class="form-control" placeholder="e.g. Mid-Term Mathematics" required></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Subject *</label>
          <select name="subject_id" class="form-control" required>
            {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
          </select></div>
        <div class="form-group"><label class="form-label">Section *</label>
          <select name="section_id" class="form-control" required>
            {% for s in sections %}<option value="{{ s.id }}">{{ s.full_name }}</option>{% endfor %}
          </select></div>
      </div>
      <div class="form-group"><label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="2" placeholder="Instructions for students..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Duration (minutes)</label>
          <input type="number" name="duration_minutes" class="form-control" value="60" min="5"></div>
        <div class="form-group"><label class="form-label">Total Marks</label>
          <input type="number" name="total_marks" class="form-control" value="100" min="1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Start Time</label>
          <input type="datetime-local" name="start_time" class="form-control"></div>
        <div class="form-group"><label class="form-label">End Time</label>
          <input type="datetime-local" name="end_time" class="form-control"></div>
      </div>
    </div>
    <div class="modal-footer">
      <a href="{{ url_for('exams.index') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">Create &amp; Add Questions →</button>
    </div>
  </form>
</div>
{% endblock %}
